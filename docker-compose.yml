version: '3.9'

services:
  # ── Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: callcenter_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: callcenter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: callcenter_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: callcenter_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: callcenter_prod_secret_change_me_2024
      JWT_EXPIRES_IN: 8h
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend (nginx) ──────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: callcenter_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pg_data:
  uploads_data:
