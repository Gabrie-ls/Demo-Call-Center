<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llamadas — CallCenter Pro</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<div class="modal-overlay" id="call-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="call-modal-title">Nueva Llamada</div>
      <button class="modal-close" onclick="Modal.close('call-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="call-id">
      <div id="call-create-fields">
        <div class="form-group">
          <label class="form-label">Cliente *</label>
          <select id="call-client" class="form-control"><option value="">Seleccionar cliente...</option></select>
        </div>
        <div class="form-group" id="agent-field-wrap" data-role="admin,supervisor">
          <label class="form-label">Agente</label>
          <select id="call-agent" class="form-control"><option value="">Asignar a mí</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Notas iniciales</label>
          <textarea id="call-notes" class="form-control" rows="3" placeholder="Objetivo de la llamada..."></textarea>
        </div>
      </div>
      <div id="call-update-fields" style="display:none;">
        <div class="form-row">
          <div class="form-group mb-0">
            <label class="form-label">Estado</label>
            <select id="call-status" class="form-control">
              <option value="pending">Pendiente</option>
              <option value="in_progress">En progreso</option>
              <option value="finished">Finalizada</option>
            </select>
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Resultado</label>
            <select id="call-result" class="form-control">
              <option value="">— Sin resultado —</option>
              <option value="contacted">Contactado</option>
              <option value="no_answer">No responde</option>
              <option value="sale">Venta</option>
              <option value="follow_up">Seguimiento</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label class="form-label">Duración (segundos)</label>
          <input id="call-duration" type="number" class="form-control" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Notas del agente</label>
          <textarea id="call-notes-edit" class="form-control" rows="4" placeholder="Resultado de la conversación..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('call-modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveCall()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
if (!requireAuth()) throw '';

let calls = [], currentPage = 1, totalPages = 1, editMode = false;
const STATUS_LABELS = { pending:'Pendiente', in_progress:'En Progreso', finished:'Finalizada' };
const RESULT_LABELS = { contacted:'Contactado', no_answer:'Sin respuesta', sale:'Venta', follow_up:'Seguimiento' };

const render = () => {
  document.getElementById('app').innerHTML = `
    ${buildSidebar('calls')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Gestión de Llamadas</div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openCreate()">+ Nueva Llamada</button>
        </div>
      </div>
      <div class="page-content">
        <div class="card">
          <div class="filter-bar">
            <select class="filter-select" id="f-status" onchange="loadCalls()">
              <option value="">Todos los estados</option>
              <option value="pending">Pendiente</option>
              <option value="in_progress">En progreso</option>
              <option value="finished">Finalizada</option>
            </select>
            <select class="filter-select" id="f-result" onchange="loadCalls()">
              <option value="">Todos los resultados</option>
              <option value="contacted">Contactado</option>
              <option value="no_answer">Sin respuesta</option>
              <option value="sale">Venta</option>
              <option value="follow_up">Seguimiento</option>
            </select>
            <input type="date" class="filter-select" id="f-from" onchange="loadCalls()" placeholder="Desde">
            <input type="date" class="filter-select" id="f-to" onchange="loadCalls()" placeholder="Hasta">
            <button class="btn btn-secondary btn-sm" onclick="clearFilters()">✕ Limpiar</button>
          </div>
          <div class="table-container">
            <table>
              <thead><tr>
                <th>Cliente</th><th>Agente</th><th>Estado</th><th>Resultado</th>
                <th>Duración</th><th>Notas</th><th>Fecha</th><th>Acciones</th>
              </tr></thead>
              <tbody id="calls-tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  `;
  populateUserSidebar();
  applyRoleVisibility();
  loadCalls();
};

const clearFilters = () => {
  ['f-status','f-result','f-from','f-to'].forEach(id => document.getElementById(id).value = '');
  loadCalls();
};

const loadCalls = async () => {
  const tbody = document.getElementById('calls-tbody');
  tbody.innerHTML = '<tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';
  const params = new URLSearchParams({ page: currentPage, limit: 15 });
  ['f-status','f-result'].forEach(id => { const v = document.getElementById(id)?.value; if(v) params.set(id.replace('f-',''), v); });
  const from = document.getElementById('f-from')?.value, to = document.getElementById('f-to')?.value;
  if(from) params.set('date_from', from);
  if(to) params.set('date_to', to);
  try {
    const { data, meta } = await api.get(`/calls?${params}`);
    calls = data; totalPages = meta.pages;
    renderTable(data, meta);
  } catch (err) { Toast.error('Error', err.message); }
};

const renderTable = (data, meta) => {
  const tbody = document.getElementById('calls-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📞</div><div class="empty-text">No hay llamadas</div></div></td></tr>';
  } else {
    tbody.innerHTML = data.map(c => `
      <tr>
        <td><div class="td-main">${c.client_name}</div><div class="font-mono" style="font-size:0.72rem;color:var(--text-muted)">${c.client_phone}</div></td>
        <td>${c.agent_name}</td>
        <td>${badge(c.status, STATUS_LABELS[c.status])}</td>
        <td>${c.result ? badge(c.result, RESULT_LABELS[c.result]) : '<span style="color:var(--text-muted)">—</span>'}</td>
        <td class="font-mono" style="font-size:0.8rem">${fmtDuration(c.duration_seconds)}</td>
        <td style="max-width:160px;font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.notes||'—'}</td>
        <td style="font-size:0.78rem;color:var(--text-muted)">${fmtDate(c.created_at)}</td>
        <td>
          <div class="d-flex gap-8">
            ${c.status!=='finished'?`<button class="btn btn-secondary btn-sm btn-icon" onclick="openEdit('${c.id}')" title="Actualizar">✏️</button>`:''}
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteCall('${c.id}')" title="Eliminar" data-role="admin,supervisor">🗑</button>
          </div>
        </td>
      </tr>
    `).join('');
    applyRoleVisibility();
  }
  // Pagination
  document.getElementById('pagination').innerHTML = `
    <span class="pagination-info">${meta.total} llamadas</span>
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>
    ${Array.from({length:Math.min(5,meta.pages)},(_,i)=>{
      const p=i+1; return `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }).join('')}
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=meta.pages?'disabled':''}>›</button>
  `;
};

const goPage = (p) => { currentPage = Math.max(1, Math.min(p, totalPages)); loadCalls(); };

const openCreate = async () => {
  editMode = false;
  document.getElementById('call-modal-title').textContent = 'Nueva Llamada';
  document.getElementById('call-id').value = '';
  document.getElementById('call-create-fields').style.display = '';
  document.getElementById('call-update-fields').style.display = 'none';
  // Load clients
  const clientSel = document.getElementById('call-client');
  clientSel.innerHTML = '<option value="">Cargando...</option>';
  try {
    const { data } = await api.get('/clients?limit=200');
    clientSel.innerHTML = '<option value="">Seleccionar cliente...</option>' +
      data.map(c => `<option value="${c.id}">${c.name} — ${c.phone}</option>`).join('');
  } catch(e) {}
  // Load agents for admin/supervisor
  if(canAccess('admin','supervisor')) {
    const agentSel = document.getElementById('call-agent');
    try {
      const { data } = await api.get('/users/agents');
      agentSel.innerHTML = '<option value="">Asignar a mí</option>' + data.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    } catch(e) {}
  }
  document.getElementById('call-notes').value = '';
  Modal.open('call-modal');
};

const openEdit = (id) => {
  editMode = true;
  const c = calls.find(x => x.id === id);
  if (!c) return;
  document.getElementById('call-modal-title').textContent = 'Actualizar Llamada';
  document.getElementById('call-id').value = c.id;
  document.getElementById('call-create-fields').style.display = 'none';
  document.getElementById('call-update-fields').style.display = '';
  document.getElementById('call-status').value = c.status;
  document.getElementById('call-result').value = c.result||'';
  document.getElementById('call-duration').value = c.duration_seconds||0;
  document.getElementById('call-notes-edit').value = c.notes||'';
  Modal.open('call-modal');
};

const saveCall = async () => {
  const id = document.getElementById('call-id').value;
  try {
    if (!editMode) {
      const clientId = document.getElementById('call-client').value;
      if (!clientId) return Toast.error('Validación', 'Selecciona un cliente');
      const agentId = document.getElementById('call-agent')?.value || null;
      await api.post('/calls', { client_id: clientId, agent_id: agentId, notes: document.getElementById('call-notes').value });
      Toast.success('Llamada creada', 'Registrada correctamente');
    } else {
      await api.put(`/calls/${id}`, {
        status: document.getElementById('call-status').value,
        result: document.getElementById('call-result').value || null,
        duration_seconds: parseInt(document.getElementById('call-duration').value) || 0,
        notes: document.getElementById('call-notes-edit').value,
      });
      Toast.success('Llamada actualizada', 'Cambios guardados');
    }
    Modal.close('call-modal');
    loadCalls();
  } catch (err) { Toast.error('Error', err.message); }
};

const deleteCall = async (id) => {
  if (!confirm('¿Eliminar esta llamada?')) return;
  try { await api.delete(`/calls/${id}`); Toast.success('Eliminada', ''); loadCalls(); }
  catch (err) { Toast.error('Error', err.message); }
};

render();
</script>
</body>
</html>
